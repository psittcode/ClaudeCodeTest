data.forEach(p=>{
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(p.size,32,32),
    new THREE.MeshStandardMaterial({ color:p.color })
  );
  m.userData = {...p, angle:Math.random()*Math.PI*2};
  scene.add(m);
  meshes.push(m);
});

const saturn = meshes.find(m => m.userData.name === "Saturn");

const ringGeometry = new THREE.RingGeometry(1.5, 2.5, 64);
const ringMaterial = new THREE.MeshBasicMaterial({
  color: 0xffddaa,
  side: THREE.DoubleSide,
  transparent: true,
  opacity: 0.8
});

const ring = new THREE.Mesh(ringGeometry, ringMaterial);

ring.rotation.x = Math.PI / 2;

saturn.add(ring);

// 👇 ADD IT HERE (outside the loop)
meshes.forEach(m => {
  m.castShadow = true;
  m.receiveShadow = true;
});

// Click interaction
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("click", e=>{
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects([...meshes, sun]);

  if (hits.length > 0) {
    document.getElementById("panel").style.display = "block";
    document.getElementById("panel").innerHTML = hits[0].object.userData.info;
  }
});

// Speed (exponential scaling)
let speed = 0.0005;
document.getElementById("speed").oninput = e=>{
  speed = Math.pow(10, parseFloat(e.target.value));
};

// Animation
function animate(){
  requestAnimationFrame(animate);

  meshes.forEach(m=>{
    m.userData.angle += m.userData.speed * speed;
    m.position.x = Math.cos(m.userData.angle)*m.userData.dist;
    m.position.z = Math.sin(m.userData.angle)*m.userData.dist;
  });

  renderer.render(scene,camera);
}
animate();

// Resize
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
